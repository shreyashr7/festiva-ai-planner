version: '3.8'

services:
  # =========================================================================
  # FESTIVA API - FastAPI Backend Server
  # =========================================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: festiva-api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=info
    volumes:
      - ./phase_1_data_ml:/app/phase_1_data_ml:ro
      - ./phase_2_nlp_rag:/app/phase_2_nlp_rag:ro
      - ./phase_3_agents:/app/phase_3_agents:ro
      - ./phase_4_deployment:/app/phase_4_deployment:ro
      - ./logs:/app/logs
    command: >
      uvicorn 
      phase_4_deployment.server:app 
      --host 0.0.0.0 
      --port 8000 
      --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - festiva-network
    depends_on:
      - cache

  # =========================================================================
  # FESTIVA DASHBOARD - Streamlit Frontend
  # =========================================================================
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: festiva-dashboard
    ports:
      - "8501:8501"
    environment:
      - PYTHONUNBUFFERED=1
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_ENABLE_CORS=true
      - STREAMLIT_CLIENT_TOOLBAR_MODE=viewer
    volumes:
      - ./phase_1_data_ml:/app/phase_1_data_ml:ro
      - ./phase_2_nlp_rag:/app/phase_2_nlp_rag:ro
      - ./phase_3_agents:/app/phase_3_agents:ro
      - ./phase_4_deployment:/app/phase_4_deployment:ro
      - ./logs:/app/logs
      - streamlit-cache:/app/.streamlit
    command: >
      streamlit run 
      phase_4_deployment/app.py 
      --logger.level=info
    networks:
      - festiva-network
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # =========================================================================
  # REDIS CACHE (Optional - for future caching layer)
  # =========================================================================
  cache:
    image: redis:7-alpine
    container_name: festiva-cache
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - festiva-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # =========================================================================
  # NGINX REVERSE PROXY (Optional - for production load balancing)
  # =========================================================================
  # nginx:
  #   image: nginx:alpine
  #   container_name: festiva-nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./certs:/etc/nginx/certs:ro
  #   depends_on:
  #     - api
  #     - dashboard
  #   networks:
  #     - festiva-network

# =========================================================================
# NETWORKS
# =========================================================================
networks:
  festiva-network:
    driver: bridge

# =========================================================================
# VOLUMES
# =========================================================================
volumes:
  redis-data:
    driver: local
  streamlit-cache:
    driver: local
