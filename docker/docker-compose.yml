version: '3.8'

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: festiva-api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=info
    env_file:
      - ../.env
    volumes:
      - ../data:/app/data:ro
      - ../models:/app/models:ro
    command: uvicorn festiva.api.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - festiva-network

  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: festiva-dashboard
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
    volumes:
      - ../dashboard:/app/dashboard:ro
    command: streamlit run dashboard/app.py
    depends_on:
      - api
    networks:
      - festiva-network

  cache:
    image: redis:7-alpine
    container_name: festiva-cache
    ports:
      - "6379:6379"
    networks:
      - festiva-network

networks:
  festiva-network:
    driver: bridge
